name: Build and Publish Docker Image

on:
  push:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # 🟢 Bun only (NO Node.js at all)
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # -------------------------
      # Quality checks (Bun-based)
      # -------------------------
      - name: Run ESLint
        run: bun run lint

      - name: Type check (via Bun)
        run: bunx tsc --noEmit

      - name: Test (if exists)
        run: bun test || true

      - name: Security audit
        run: bun audit || true

      # -------------------------
      # Docker
      # -------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_TURNSTILE_TOKEN=${{ secrets.NEXT_PUBLIC_TURNSTILE_TOKEN }}
            NEXT_PUBLIC_GIT_URL=${{ secrets.NEXT_PUBLIC_GIT_URL }}

      # -------------------------
      # Deploy tag
      # -------------------------
      - name: Create deploy tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          if [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            TAG="staging-deploy-$(date +'%Y%m%d-%H%M%S')"
          else
            TAG="deploy-$(date +'%Y%m%d-%H%M%S')"
          fi

          git tag "$TAG"
          git push origin "$TAG"