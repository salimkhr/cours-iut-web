services:
  app:
    image: ghcr.io/salimkhr/cours-iut-web:staging
    pull_policy: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
    env_file:
      - .env
    restart: unless-stopped
    init: true

    networks:
      - dokploy-network
    volumes:
      - /etc/dokploy/volumes/cours-iut-web-uploads:/app/uploads
      - /etc/dokploy/volumes/cours-iut-web-quarantine:/app/quarantine
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  dokploy-network:
    external: true
