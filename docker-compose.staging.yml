services:
  app:
    image: ghcr.io/salimkhr/cours-iut-web:staging
    pull_policy: always
    environment:
      - NODE_ENV=staging
      - PORT=3000
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - /etc/dokploy/volumes/cours-iut-web-uploads:/app/uploads
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
